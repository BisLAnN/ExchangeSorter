<svg width="680" viewBox="0 0 680 1700" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif;">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 1. НАЧАЛО -->
<rect x="250" y="30" width="180" height="44" rx="22" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Начало</text>

<line x1="340" y1="74" x2="340" y2="110" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 2. ВВОД -->
<polygon points="210,110 470,110 450,158 190,158" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="330" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Ввод: numbers[ ]</text>
<text x="330" y="146" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4A4A68">size = n</text>

<line x1="340" y1="158" x2="340" y2="210" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 3. i = 0 -->
<rect x="230" y="210" width="220" height="44" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">i = 0</text>

<line x1="340" y1="254" x2="340" y2="300" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 4. i < size-1? -->
<polygon points="340,300 470,348 340,396 210,348" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="342" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">i &lt; size − 1?</text>
<text x="348" y="406" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="478" y="344" text-anchor="start" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="396" x2="340" y2="442" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>
<path d="M470 348 L590 348 L590 1360 L450 1360" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 5. j = i + 1 -->
<rect x="230" y="442" width="220" height="44" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="464" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">j = i + 1</text>

<line x1="340" y1="486" x2="340" y2="532" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 6. j < size? -->
<polygon points="340,532 470,580 340,628 210,580" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">j &lt; size?</text>
<text x="348" y="638" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="140" y="576" text-anchor="middle" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="628" x2="340" y2="674" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>
<path d="M210 580 L90 580 L90 1200 L230 1200" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 7. numbers[i] > numbers[j]? -->
<polygon points="340,674 480,730 340,786 200,730" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="722" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[i] &gt;</text>
<text x="340" y="740" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[j]?</text>
<text x="348" y="796" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="488" y="726" text-anchor="start" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="786" x2="340" y2="832" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>
<path d="M480 730 L560 730 L560 1060 L450 1060" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 8. SWAP -->
<rect x="190" y="832" width="300" height="70" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="856" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">temp = numbers[i]</text>
<text x="340" y="874" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[i] = numbers[j]</text>
<text x="340" y="892" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[j] = temp</text>

<line x1="340" y1="902" x2="340" y2="1060" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 9. j = j + 1 -->
<rect x="230" y="1060" width="220" height="44" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="1082" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">j = j + 1</text>

<path d="M230 1082 L150 1082 L150 442 L230 442" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 10. i = i + 1 -->
<rect x="230" y="1200" width="220" height="44" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="1222" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">i = i + 1</text>

<path d="M230 1222 L120 1222 L120 210 L230 210" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 11. ВЫВОД -->
<polygon points="190,1360 470,1360 450,1408 170,1408" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="318" y="1378" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Вывод:</text>
<text x="318" y="1396" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4A4A68">отсортированный numbers[ ]</text>

<line x1="320" y1="1408" x2="320" y2="1454" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arr)"/>

<!-- 12. КОНЕЦ -->
<rect x="230" y="1454" width="180" height="44" rx="22" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="320" y="1476" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Конец</text>

</svg>
