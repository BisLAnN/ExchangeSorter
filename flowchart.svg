<svg width="680" viewBox="0 0 680 1420" xmlns="http://www.w3.org/2000/svg" style="background:#F7F4EF;font-family:Arial,sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 1. НАЧАЛО -->
<rect x="255" y="30" width="170" height="44" rx="22" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#2C2C2A">Начало</text>

<line x1="340" y1="74" x2="340" y2="108" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 2. ВВОД -->
<polygon points="225,108 455,108 435,152 205,152" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="330" y="124" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Ввод: массив</text>
<text x="330" y="141" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4A4A68">numbers[ ], size = n</text>

<line x1="340" y1="152" x2="340" y2="186" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 3. i = 0 -->
<rect x="230" y="186" width="220" height="44" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="208" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#0C447C">i = 0</text>

<line x1="340" y1="230" x2="340" y2="264" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 4. i < size-1? -->
<polygon points="340,264 460,308 340,352 220,308" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">i &lt; size−1?</text>
<text x="350" y="362" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="474" y="304" text-anchor="start" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="352" x2="340" y2="386" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M460 308 L570 308 L570 1100 L455 1100" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 5. j = i + 1 -->
<rect x="230" y="386" width="220" height="44" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="408" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#0C447C">j = i + 1</text>

<line x1="340" y1="430" x2="340" y2="464" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 6. j < size? -->
<polygon points="340,464 460,508 340,552 220,508" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">j &lt; size?</text>
<text x="350" y="562" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="154" y="504" text-anchor="middle" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="552" x2="340" y2="586" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 7. numbers[i] > numbers[j]? -->
<polygon points="340,586 480,638 340,690 200,638" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="340" y="628" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[i] &gt;</text>
<text x="340" y="648" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">numbers[j]?</text>
<text x="350" y="700" text-anchor="middle" font-size="12" fill="#4A4A68">да</text>
<text x="494" y="634" text-anchor="start" font-size="12" fill="#4A4A68">нет</text>

<line x1="340" y1="690" x2="340" y2="724" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M480 638 L540 638 L540 810 L450 810" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 8. SWAP -->
<rect x="200" y="724" width="280" height="66" rx="4" fill="#F5C4B3" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="747" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#712B13">temp = numbers[i]</text>
<text x="340" y="765" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#712B13">numbers[i] = numbers[j]</text>
<text x="340" y="783" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#712B13">numbers[j] = temp</text>

<line x1="340" y1="790" x2="340" y2="810" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 9. j++ -->
<rect x="230" y="810" width="220" height="44" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="832" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#0C447C">j = j + 1</text>

<!-- Петля j++ → j < size? -->
<path d="M340 854 L340 910 L80 910 L80 508 L220 508" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 10. i++ -->
<path d="M220 508 L110 508 L110 960 L230 960" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="230" y="960" width="220" height="44" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
<text x="340" y="982" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#0C447C">i = i + 1</text>

<!-- Петля i++ → i < size-1? -->
<path d="M340 1004 L340 1040 L60 1040 L60 308 L220 308" fill="none" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 11. ВЫВОД -->
<polygon points="205,1100 455,1100 435,1144 185,1144" fill="none" stroke="#1A1A2E" stroke-width="1"/>
<text x="318" y="1116" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#1A1A2E">Вывод:</text>
<text x="318" y="1133" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4A4A68">отсортированный numbers[ ]</text>

<line x1="320" y1="1144" x2="320" y2="1178" stroke="#1A1A2E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 12. КОНЕЦ -->
<rect x="235" y="1178" width="170" height="44" rx="22" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
<text x="320" y="1200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="#2C2C2A">Конец</text>

</svg>
